# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Enables a combination of settings that are planned to be default
# in future versions of ZMK to improve connection stability. Currently
# this only disables 2M PHY support.
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN
# This includes enabling BT Secure Connection passkey entry,
# and allows overwrite of keys from previously paired hosts.
# CONFIG_ZMK_BLE_EXPERIMENTAL_SEC
# Aggregate config that enables both CONFIG_ZMK_BLE_EXPERIMENTAL_CONN and CONFIG_ZMK_BLE_EXPERIMENTAL_SEC.
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Enable passkey entry during pairing for enhanced security.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Enable deep sleep support
CONFIG_ZMK_SLEEP=y
